version: '3.8'

services:
  hubcinema-webuser:
    image: ${DOCKER_USERNAME}/hubcinema-webuser:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped
